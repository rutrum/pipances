<tr>
  <td>
    <input type="date" name="date[]" class="input input-bordered input-sm w-full" />
  </td>
  <td>
    <input type="number"
           name="amount[]"
           step="0.01"
           class="input input-bordered input-sm w-full"
           placeholder="0.00" />
  </td>
  <td>
    <input type="text"
           name="description[]"
           class="input input-bordered input-sm w-full"
           placeholder="Description" />
  </td>
  <td>
    <button type="button"
            class="btn btn-ghost btn-sm"
            onclick="this.closest('tr').remove()">
      <i data-lucide="x" class="w-4 h-4"></i>
    </button>
  </td>
</tr>
