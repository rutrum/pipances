<div id="{{ pagination_id }}"
     {% if oob %}hx-swap-oob="outerHTML:#{{ pagination_id }}"{% endif %}
     class="flex items-center justify-between mt-4">
  <div class="join">
    {% if page > 1 %}
      <button class="btn btn-sm join-item"
              hx-get="{{ pagination_url }}"
              hx-target="{{ pagination_target }}"
              hx-include="{{ pagination_include }}, #{{ pagination_id }}-page-size"
              hx-push-url="true"
              hx-vals='{"page": "{{ page - 1 }}"}'>« Prev</button>
    {% else %}
      <button class="btn btn-sm join-item btn-disabled">« Prev</button>
    {% endif %}
    <span class="text-sm">Page {{ page }} of {{ total_pages }}</span>
    {% if page < total_pages %}
      <button class="btn btn-sm join-item"
              hx-get="{{ pagination_url }}"
              hx-target="{{ pagination_target }}"
              hx-include="{{ pagination_include }}, #{{ pagination_id }}-page-size"
              hx-push-url="true"
              hx-vals='{"page": "{{ page + 1 }}"}'>Next »</button>
    {% else %}
      <button class="btn btn-sm join-item btn-disabled">Next »</button>
    {% endif %}
  </div>
  <div class="flex items-center gap-2">
    <span class="text-sm opacity-70 whitespace-nowrap">{{ total_count }} transactions</span>
    <select id="{{ pagination_id }}-page-size"
            class="select select-bordered select-sm"
            hx-get="{{ pagination_url }}"
            hx-target="{{ pagination_target }}"
            hx-include="{{ pagination_include }}, #{{ pagination_id }}-page-size"
            hx-push-url="true"
            hx-vals='{"page": "1"}'
            name="page_size">
      {% for size in [25, 50, 100] %}
        <option value="{{ size }}" {% if page_size == size %}selected{% endif %}>{{ size }}/page</option>
      {% endfor %}
    </select>
  </div>
</div>
