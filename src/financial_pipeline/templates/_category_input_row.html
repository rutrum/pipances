<tr id="category-input-row"
    class="bg-base-200 border-t-2 border-dashed border-base-300">
  <td>
    <input type="text"
           name="name"
           placeholder="Category name"
           required
           class="input input-bordered input-sm w-full"
           form="create-category-form">
  </td>
  <td>
    <form id="create-category-form"
          hx-post="/settings/categories"
          hx-target="#category-input-row"
          hx-swap="beforebegin"
          hx-target-422="#category-error"
          hx-on::after-request="if(event.detail.xhr.status &lt; 300) { this.reset(); var el = document.getElementById('category-error'); if(el) el.innerHTML=''; }">
      <button type="submit" class="btn btn-primary btn-xs">Add</button>
    </form>
  </td>
</tr>
