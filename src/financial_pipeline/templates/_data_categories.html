<h2 class="text-lg font-semibold mb-4">Categories</h2>
{% if not categories %}
  <div class="alert alert-info mb-4">
    <span>No categories yet. Categories are created automatically when you assign them to transactions.</span>
  </div>
{% endif %}
<div class="overflow-x-auto">
  <table class="table table-zebra w-full">
    <thead>
      <tr>
        <th>Name</th>
        <th>Transactions</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="categories-table-body">
      {% for category in categories %}
        {% include "_category_row.html" %}
      {% endfor %}
    </tbody>
  </table>
</div>
