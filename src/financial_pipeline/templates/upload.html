{% extends "base.html" %}
{% block title %}
  Upload - Financial Pipeline
{% endblock title %}
{% block content %}
  <div class="flex justify-center items-center min-h-screen">
    <div class="card bg-base-100 shadow-xl w-full max-w-md">
      <div class="card-body">
        <h2 class="card-title">Upload Transactions</h2>
        {% if not accounts %}
          <div class="alert alert-warning">
            <span>No accounts available. <a href="/settings/accounts" class="link link-primary">Create an account</a> first.</span>
          </div>
        {% else %}
          <form hx-post="/upload"
                hx-encoding="multipart/form-data"
                hx-target="#upload-error">
            <div class="form-control w-full mb-4">
              <label class="label">
                <span class="label-text">Importer</span>
              </label>
              <select name="importer" class="select select-bordered w-full" required>
                <option disabled selected value="">Select an importer</option>
                {% for module_name, info in importers.items() %}<option value="{{ module_name }}">{{ info.name }}</option>{% endfor %}
              </select>
            </div>
            <div class="form-control w-full mb-4">
              <label class="label">
                <span class="label-text">Account</span>
              </label>
              <select name="account" class="select select-bordered w-full" required>
                <option disabled selected value="">Select an account</option>
                {% for account in accounts %}<option value="{{ account.name }}">{{ account.name }}</option>{% endfor %}
              </select>
            </div>
            <div class="form-control w-full mb-4">
              <label class="label">
                <span class="label-text">CSV File</span>
              </label>
              <input type="file"
                     name="file"
                     class="file-input file-input-bordered w-full"
                     required />
            </div>
            <div id="upload-error" class="mb-4"></div>
            <div class="card-actions justify-end">
              <button type="submit" class="btn btn-primary">Upload</button>
            </div>
          </form>
        {% endif %}
      </div>
    </div>
  </div>
{% endblock content %}
