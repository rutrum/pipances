<h2 class="text-lg font-semibold mb-4">External Accounts</h2>
{% if not accounts %}
  <div class="alert alert-info mb-4">
    <span>No external accounts yet. They are created automatically when you import transactions.</span>
  </div>
{% endif %}
<div class="overflow-x-auto">
  <table class="table table-zebra w-full">
    <thead>
      <tr>
        <th>Name</th>
        <th>Transactions</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for account in accounts %}
        <tr>
          <td>{{ account.name }}</td>
          <td>{{ account.txn_count }}</td>
          <td>
            <a href="/explore?external={{ account.name | urlencode }}"
               class="btn btn-ghost btn-xs"
               title="View in Explore">
              <i data-lucide="compass" class="w-4 h-4"></i>
            </a>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
