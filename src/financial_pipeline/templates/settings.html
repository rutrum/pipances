{% extends "base.html" %}

{% block title %}Settings - Financial Pipeline{% endblock %}

{% block content %}
<div class="container mx-auto p-6">
  <h1 class="text-2xl font-bold mb-4">Settings</h1>

  <div role="tablist" class="tabs tabs-bordered mb-6">
    <a role="tab" href="/settings/accounts"
       class="tab {% if settings_tab == 'accounts' %}tab-active{% endif %}">Accounts</a>
  </div>

  {% block settings_content %}{% endblock %}
</div>
{% endblock %}
