<div class="navbar bg-base-100 shadow-sm">
  <div class="flex-1">
    <a href="/" class="btn btn-ghost text-xl">Financial Pipeline</a>
  </div>
  <div class="flex-none">
    <ul class="menu menu-horizontal px-1">
      <li>
        <a href="/upload"
           {% if active_page == 'upload' %}class="active"{% endif %}><i data-lucide="upload" class="w-4 h-4"></i> Upload</a>
      </li>
      <li>
        <a href="/inbox"
           {% if active_page == 'inbox' %}class="active"{% endif %}>
          <i data-lucide="inbox" class="w-4 h-4"></i> Inbox
          <span id="inbox-badge">
            {% if inbox_count %}<span class="badge badge-sm badge-primary">{{ inbox_count }}</span>{% endif %}
          </span>
        </a>
      </li>
      <li>
        <a href="/explore"
           {% if active_page == 'explore' %}class="active"{% endif %}><i data-lucide="compass" class="w-4 h-4"></i> Explore</a>
      </li>
      <li>
        <a href="/data" {% if active_page == 'data' %}class="active"{% endif %}><i data-lucide="database" class="w-4 h-4"></i> Data</a>
      </li>
    </ul>
  </div>
</div>
