<div id="dashboard-date-range"
     class="mb-4 flex flex-wrap items-center gap-2">
  <div class="join">
    <button class="btn join-item {% if preset == 'last_month' %}btn-active{% endif %}"
            hx-get="/dashboard/content"
            hx-target="#dashboard-content"
            hx-include="#dashboard-state"
            hx-vals='{"preset": "last_month"}'>Last Month</button>
    <button class="btn join-item {% if preset == 'last_3_months' %}btn-active{% endif %}"
            hx-get="/dashboard/content"
            hx-target="#dashboard-content"
            hx-include="#dashboard-state"
            hx-vals='{"preset": "last_3_months"}'>Last 3 Months</button>
    <button class="btn join-item {% if preset == 'ytd' %}btn-active{% endif %}"
            hx-get="/dashboard/content"
            hx-target="#dashboard-content"
            hx-include="#dashboard-state"
            hx-vals='{"preset": "ytd"}'>YTD</button>
    <button class="btn join-item {% if preset == 'last_year' %}btn-active{% endif %}"
            hx-get="/dashboard/content"
            hx-target="#dashboard-content"
            hx-include="#dashboard-state"
            hx-vals='{"preset": "last_year"}'>Last Year</button>
    <button class="btn join-item {% if preset == 'all' %}btn-active{% endif %}"
            hx-get="/dashboard/content"
            hx-target="#dashboard-content"
            hx-include="#dashboard-state"
            hx-vals='{"preset": "all"}'>All Time</button>
    <button class="btn join-item {% if preset == 'custom' %}btn-active{% endif %}"
            onclick="document.getElementById('dashboard-custom-range').classList.toggle('hidden')">Custom</button>
  </div>
  <div id="dashboard-custom-range"
       class="{% if preset != 'custom' %}hidden{% endif %} flex items-center gap-2">
    <input type="date"
           name="date_from"
           value="{{ date_from }}"
           class="input input-bordered input-sm"
           form="dashboard-custom-form">
    <span>to</span>
    <input type="date"
           name="date_to"
           value="{{ date_to }}"
           class="input input-bordered input-sm"
           form="dashboard-custom-form">
    <button class="btn btn-sm btn-primary"
            hx-get="/dashboard/content"
            hx-target="#dashboard-content"
            hx-include="#dashboard-state, #dashboard-custom-range input"
            hx-vals='{"preset": "custom"}'>Apply</button>
  </div>
</div>
