<div class="flex items-center justify-between mt-4">
  <div class="join">
    {% if page > 1 %}
      <button class="btn btn-sm join-item"
              hx-get="/transactions"
              hx-target="#txn-table-wrapper"
              hx-include="#txn-filters"
              hx-vals='{"page": "{{ page - 1 }}"}'>« Prev</button>
    {% else %}
      <button class="btn btn-sm join-item btn-disabled">« Prev</button>
    {% endif %}
    <button class="btn btn-sm join-item btn-disabled">Page {{ page }} of {{ total_pages }}</button>
    {% if page < total_pages %}
      <button class="btn btn-sm join-item"
              hx-get="/transactions"
              hx-target="#txn-table-wrapper"
              hx-include="#txn-filters"
              hx-vals='{"page": "{{ page + 1 }}"}'>Next »</button>
    {% else %}
      <button class="btn btn-sm join-item btn-disabled">Next »</button>
    {% endif %}
  </div>
  <div class="flex items-center gap-2">
    <span class="text-sm opacity-70">{{ total_count }} transactions</span>
    <select class="select select-bordered select-sm"
            hx-get="/transactions"
            hx-target="#txn-table-wrapper"
            hx-include="#txn-filters"
            hx-vals='{"page": "1"}'
            name="page_size">
      {% for size in [25, 50, 100] %}
        <option value="{{ size }}" {% if page_size == size %}selected{% endif %}>{{ size }}/page</option>
      {% endfor %}
    </select>
  </div>
</div>
